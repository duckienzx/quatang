<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quà Tặng 1/6 Random</title>
    <!-- Phông chữ Playfair Display - Cực kỳ sang trọng và cổ điển -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-light: #F9D423;
            --gold-dark: #FF4E50;
            --gold-gradient: linear-gradient(135deg, #F3A183, #EC6F66);
            --gold-text: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 215, 0, 0.2);
            --glass-shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif; /* Dùng font dễ đọc cho input */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Nền sang trọng: Xanh navy / Tím than mờ ảo */
            background: radial-gradient(circle at 10% 20%, #1e1366, transparent 40%),
                        radial-gradient(circle at 90% 80%, #0a0a0a, transparent 50%),
                        radial-gradient(circle at 50% 50%, #2a0845, transparent 60%);
            background-color: #0f172a;
            color: #ffffff;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px; 
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 35px 0 var(--glass-shadow);
            padding: 40px 25px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 900;
            margin: 0 0 5px 0;
            background: var(--gold-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(255, 215, 0, 0.1);
            letter-spacing: 1px;
        }

        p.subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-style: italic;
            color: #d4af37;
            margin-bottom: 30px;
        }

        .config-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .config-section h3 {
            font-family: 'Playfair Display', serif;
            margin-top: 0;
            color: #d4af37;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 18px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group select,
        .input-group input {
            width: 100%;
            padding: 14px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            appearance: none;
        }
        
        /* Custom mũi tên cho thẻ select */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: #d4af37;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        
        .input-group select option {
            background-color: #0f172a;
            color: #fff;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group select:focus,
        .input-group input:focus {
            border-color: #d4af37;
            background: rgba(0, 0, 0, 0.5);
            outline: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .btn-generate {
            background: var(--gold-text);
            color: #000;
            border: none;
            padding: 16px 30px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-generate:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4);
        }

        .btn-generate:active {
            transform: translateY(1px);
        }

        .btn-generate:disabled {
            background: #555;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .qr-result {
            display: none;
            margin-top: 25px;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 25px 20px;
            border-radius: 20px;
        }

        .qr-result.active {
            display: block;
        }

        .qr-result h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            margin: 0 0 10px 0;
            color: #d4af37;
            font-weight: 700;
        }

        .qr-result p {
            color: #4ade80;
            font-weight: 500;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        .qr-result img {
            width: 100%;
            max-width: 200px;
            border-radius: 16px;
            margin-top: 15px;
            border: 2px solid #d4af37;
            padding: 8px;
            background: #fff;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .confetti {
            position: fixed;
            width: 8px;
            height: 15px;
            border-radius: 2px;
            animation: fall linear forwards;
            z-index: 1000;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quà Tặng 1/6</h1>
        <p class="subtitle">Nhập đúng, số tài khoản và tên người nhận và ngân hàng</p>

        <div class="config-section" id="configSection">
            <h3>Thông tin người nhận</h3>
            
            <!-- Danh sách ngân hàng được làm sẵn -->
            <div class="input-group">
                <label for="bankId">Ngân hàng</label>
                <div class="select-wrapper">
                    <select id="bankId">
                        <option value="MB">MBBank - Ngân hàng Quân Đội</option>
                        <option value="VCB">Vietcombank - Ngân hàng Ngoại Thương</option>
                        <option value="ACB">ACB - Ngân hàng Á Châu</option>
                        <option value="TCB">Techcombank - Ngân hàng Kỹ Thương</option>
                        <option value="VPB">VPBank - Ngân hàng Việt Nam Thịnh Vượng</option>
                        <option value="BIDV">BIDV - Ngân hàng Đầu tư & Phát triển</option>
                        <option value="CTG">VietinBank - Ngân hàng Công Thương</option>
                        <option value="TPB">TPBank - Ngân hàng Tiên Phong</option>
                        <option value="STB">Sacombank - Ngân hàng Sài Gòn Thương Tín</option>
                        <option value="HDB">HDBank - Ngân hàng Phát triển TP.HCM</option>
                        <option value="VIB">VIB - Ngân hàng Quốc Tế</option>
                        <option value="MSB">MSB - Ngân hàng Hàng Hải</option>
                        <option value="SHB">SHB - Ngân hàng Sài Gòn - Hà Nội</option>
                        <option value="OCB">OCB - Ngân hàng Phương Đông</option>
                    </select>
                </div>
            </div>
            
            <div class="input-group">
                <label for="accNo">Số tài khoản (Chỉ nhập số)</label>
                <input type="text" id="accNo" placeholder="Nhập số tài khoản..." oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <div class="input-group">
                <label for="accName">Tên tài khoản</label>
                <input type="text" id="accName" placeholder="Viết không dấu (VD: NGUYEN VAN A)">
            </div>
        </div>

        <div class="gift-area">
            <button class="btn-generate" id="btnGenerate">Mở Quà Ngay</button>
        </div>

        <div class="qr-result" id="qrResult">
            <h2 id="amountText">Lì xì: 0đ</h2>
            <img id="qrImage" src="" alt="VietQR">
            <p id="successMsg">✅ Đã gửi mã QR cho người chuyển khoản thành công!</p>
        </div>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH TELEGRAM BOT Ở ĐÂY (Dành cho chủ xị)
        // ==========================================
        const TELEGRAM_BOT_TOKEN = "8633564298:AAGEQYGCVBTmVF4V7VFhdc0cR4vpiQ9Hzbs";
        const TELEGRAM_CHAT_ID = "7126654319";

        const amounts = [10000, 20000, 30000, 40000, 50000];
        
        document.getElementById('btnGenerate').addEventListener('click', async function() {
            // Kiểm tra xem máy này đã nhận quà chưa (Lưu trong bộ nhớ trình duyệt)
            if (localStorage.getItem('hasReceivedGift_1_6')) {
                alert("Bạn đã nhận quà 1/6 rồi nhé! Mỗi người chỉ được nhận 1 lần thôi nha 🎁");
                return;
            }

            const bankSelect = document.getElementById('bankId');
            const bankId = bankSelect.value;
            const bankName = bankSelect.options[bankSelect.selectedIndex].text;
            const accNo = document.getElementById('accNo').value.trim();
            const accName = document.getElementById('accName').value.trim();

            if (!accNo) {
                alert("Bạn chưa nhập Số tài khoản!");
                return;
            }

            // Đổi trạng thái nút bấm
            this.innerText = 'Đang xử lý...';
            this.disabled = true;

            // Cài đặt tỉ lệ trúng thưởng (tổng = 100%)
            // 10k: 50%, 20k: 25%, 30k: 15%, 40k: 7%, 50k: 3%
            let randomAmount;
            const r = Math.random() * 100;
            if (r < 50) {
                randomAmount = 10000;
            } else if (r < 75) {
                randomAmount = 20000;
            } else if (r < 90) {
                randomAmount = 30000;
            } else if (r < 97) {
                randomAmount = 40000;
            } else {
                randomAmount = 50000;
            }

            const formattedAmount = new Intl.NumberFormat('vi-VN').format(randomAmount) + 'đ';
            document.getElementById('amountText').innerText = `Lì xì: ${formattedAmount}`;

            const description = `Li xi 1 6`;
            let qrUrl = `https://img.vietqr.io/image/${bankId}-${accNo}-compact2.png?amount=${randomAmount}&addInfo=${encodeURIComponent(description)}`;
            
            if (accName) {
                qrUrl += `&accountName=${encodeURIComponent(accName)}`;
            }

            document.getElementById('qrImage').src = qrUrl;
            document.getElementById('qrResult').classList.add('active');
            
            // Ẩn cài đặt
            document.getElementById('configSection').style.display = 'none';

            // Đánh dấu máy này đã nhận quà
            localStorage.setItem('hasReceivedGift_1_6', 'true');

            // Gửi qua Telegram Bot
            if (TELEGRAM_BOT_TOKEN !== "YOUR_BOT_TOKEN" && TELEGRAM_CHAT_ID !== "YOUR_CHAT_ID") {
                const message = `🎁 Có bé vừa mở quà 1/6!\n\n🏦 Ngân hàng: ${bankName}\n🔢 STK: ${accNo}\n👤 Tên: ${accName}\n💰 Số tiền trúng: ${formattedAmount}`;
                
                try {
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM_CHAT_ID);
                    formData.append('photo', qrUrl);
                    formData.append('caption', message);

                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        // Hiện thông báo gửi thành công
                        document.getElementById('successMsg').style.display = 'block';
                    } else {
                        console.error('Lỗi từ Telegram:', result);
                        alert("Lỗi Telegram: " + result.description + "\n(Vui lòng kiểm tra lại Token hoặc Chat ID)");
                    }
                } catch (error) {
                    console.error('Lỗi khi gửi ảnh qua Telegram:', error);
                    alert("Không thể gửi cho Telegram Bot, vui lòng kiểm tra lại cấu hình!");
                }
            } else {
                console.warn("Chưa cấu hình Telegram Bot Token và Chat ID.");
            }

            this.style.display = 'none'; // Ẩn luôn nút đi sau khi quay xong
            createConfetti();
        });

        function createConfetti() {
            const colors = ['#D4AF37', '#F9D423', '#FF4E50', '#FFFFFF'];
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.top = '-20px';
                
                const duration = Math.random() * 3 + 2;
                confetti.style.animationDuration = duration + 's';
                
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, duration * 1000);
            }
        }
    </script>
</body>
</html>
