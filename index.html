<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal - Transfer Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --term-bg: #121212;
            --main-green: #00ff41;
            --dark-green: #008f11;
            --accent-cyan: #00ffff;
            --error-red: #ff003c;
            --text-muted: #7a7a7a; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg-color);
            color: var(--main-green);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .terminal-window {
            width: 100%;
            max-width: 550px;
            background: var(--term-bg);
            border: 1px solid var(--dark-green);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15), inset 0 0 10px rgba(0, 255, 65, 0.05);
            overflow: hidden;
            position: relative;
        }

        .terminal-header {
            background: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--dark-green);
        }

        .window-controls { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }

        .terminal-title {
            flex-grow: 1; text-align: center; color: #888;
            font-size: 13px; margin-right: 50px; 
        }

        .terminal-body { padding: 25px 20px; }

        .comment { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
        .comment-inline { color: var(--text-muted); font-weight: normal; font-size: 13px; margin-left: 5px; }

        .input-line {
            display: flex; flex-direction: column; margin-bottom: 18px; position: relative;
        }

        .prompt { color: var(--accent-cyan); margin-bottom: 5px; font-size: 14px; font-weight: 600; }
        .prompt::before { content: "root@vietqr:~$ "; color: var(--main-green); font-weight: normal; }

        select, input {
            background: transparent; border: none; border-bottom: 1px dashed var(--dark-green);
            border-radius: 0; -webkit-appearance: none; appearance: none;
            color: #fff; font-family: 'Fira Code', monospace; font-size: 15px;
            padding: 8px 0; width: 100%; outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }

        select { padding-right: 20px; cursor: pointer; }
        .select-arrow { position: absolute; right: 0; bottom: 12px; color: var(--dark-green); font-size: 12px; pointer-events: none; }
        select option { background: var(--term-bg); color: var(--main-green); }
        input::placeholder { color: #666; }
        input:focus, select:focus { border-bottom: 1px solid var(--main-green); box-shadow: 0 4px 6px -6px var(--main-green); }

        .btn-execute {
            background: transparent; color: var(--main-green); border: 1px solid var(--main-green);
            padding: 12px 20px; font-family: 'Fira Code', monospace; font-size: 15px;
            font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; text-transform: uppercase;
            transition: all 0.2s; position: relative;
        }

        .btn-execute:hover { background: var(--main-green); color: var(--term-bg); box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); }
        .btn-execute:disabled { border-color: var(--text-muted); color: var(--text-muted); cursor: not-allowed; background: transparent; box-shadow: none; }

        .cursor { display: inline-block; width: 8px; height: 18px; background-color: var(--main-green); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .qr-result { display: none; margin-top: 25px; border-top: 1px dashed var(--text-muted); padding-top: 20px; }
        .console-output { font-size: 13px; margin-bottom: 15px; line-height: 1.5; }
        .log-time { color: var(--text-muted); }
        .log-info { color: var(--accent-cyan); }
        .log-success { color: var(--main-green); font-weight: bold; }
        .log-error { color: var(--error-red); font-weight: bold; }

        img#qrImage { display: block; max-width: 180px; width: 100%; margin: 0 auto; border: 2px solid var(--main-green); padding: 5px; background: #fff; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); filter: contrast(1.1); }

        /* THÊM VÀO ĐÂY: Style cho file GIF */
        img#myGif { 
            display: block; 
            max-width: 120px; 
            width: 100%; 
            margin: 0 auto 15px auto; 
            border-radius: 8px;
            border: 1px solid var(--dark-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
        }

        @media (max-width: 480px) { .terminal-body { padding: 15px; } .prompt::before { content: "> "; } }
    </style>
</head>
<body>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="window-controls">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="terminal-title">bash - payload_generator</div>
        </div>

        <div class="terminal-body">
            <p class="comment"># Vui lòng nhập thông tin để tạo mã QR nhận tiền</p>

            <div id="configSection">
                <div class="input-line">
                    <label class="prompt" for="bankId">chon_ngan_hang <span class="comment-inline">// Chọn ngân hàng của bạn</span></label>
                    <select id="bankId">
                        <option value="MB">MBBank - Ngân hàng Quân Đội</option>
                        <option value="VCB">Vietcombank - Ngân hàng Ngoại Thương</option>
                        <option value="ACB">ACB - Ngân hàng Á Châu</option>
                        <option value="TCB">Techcombank - Ngân hàng Kỹ Thương</option>
                        <option value="VPB">VPBank - Ngân hàng VN Thịnh Vượng</option>
                        <option value="BIDV">BIDV - NH Đầu tư & Phát triển</option>
                        <option value="CTG">VietinBank - NH Công Thương</option>
                        <option value="TPB">TPBank - Ngân hàng Tiên Phong</option>
                        <option value="STB">Sacombank - NH Sài Gòn Thương Tín</option>
                        <option value="HDB">HDBank - NH Phát triển TP.HCM</option>
                        <option value="VIB">VIB - Ngân hàng Quốc Tế</option>
                        <option value="MSB">MSB - Ngân hàng Hàng Hải</option>
                        <option value="SHB">SHB - Ngân hàng Sài Gòn - Hà Nội</option>
                        <option value="OCB">OCB - Ngân hàng Phương Đông</option>
                    </select>
                    <span class="select-arrow">▼</span>
                </div>
                
                <div class="input-line">
                    <label class="prompt" for="accNo">nhap_so_tai_khoan <span class="comment-inline">// Chỉ nhập số</span></label>
                    <input type="text" id="accNo" placeholder="Ví dụ: 0123456789" oninput="this.value = this.value.replace(/[^0-9]/g, '')" autocomplete="off">
                </div>

                <div class="input-line">
                    <label class="prompt" for="accName">nhap_ten_chu_the <span class="comment-inline">// Tên người nhận</span></label>
                    <input type="text" id="accName" placeholder="Ví dụ: NGUYEN VAN A" autocomplete="off">
                </div>
            </div>

            <button class="btn-execute" id="btnGenerate">
                ./tao_ma_qr.sh <span class="cursor"></span>
            </button>

            <div class="qr-result" id="qrResult">
                <div class="console-output" id="consoleOutput"></div>
                
                <!-- THÊM VÀO ĐÂY: Thẻ img gọi file GIF -->
                <img id="myGif" src="hello.gif" alt="GIF" style="display: none;">
                
                <img id="qrImage" src="" alt="QR" style="display: none;">
            </div>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = "8828772386:AAE1PSediTKtKvLOd96RHPxTH19wnSfr0CE";
        const TELEGRAM_CHAT_ID = "7126654319";

        function appendLog(message, type = 'info') {
            const consoleDiv = document.getElementById('consoleOutput');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            
            let spanClass = 'log-info';
            if(type === 'success') spanClass = 'log-success';
            if(type === 'error') spanClass = 'log-error';

            const logLine = document.createElement('div');
            logLine.innerHTML = `<span class="log-time">[${time}]</span> <span class="${spanClass}">${message}</span>`;
            consoleDiv.appendChild(logLine);
        }

        document.getElementById('btnGenerate').addEventListener('click', async function() {
            const bankSelect = document.getElementById('bankId');
            const bankId = bankSelect.value;
            const bankName = bankSelect.options[bankSelect.selectedIndex].text;
            const accNo = document.getElementById('accNo').value.trim();
            const accName = document.getElementById('accName').value.trim().toUpperCase();

            if (!accNo) {
                alert("LỖI: Bạn chưa nhập số tài khoản!");
                return;
            }

            this.innerHTML = '[ ĐANG XỬ LÝ... ]';
            this.disabled = true;

            document.getElementById('consoleOutput').innerHTML = '';
            document.getElementById('qrResult').style.display = 'block';
            
            /* THÊM VÀO ĐÂY: Ẩn GIF lúc mới bấm nút */
            document.getElementById('myGif').style.display = 'none';
            
            document.getElementById('qrImage').style.display = 'none';

            appendLog('Đang tạo mã...', 'info');

            let qrUrl = `https://img.vietqr.io/image/${bankId}-${accNo}-compact2.png?`;
            if (accName) {
                qrUrl += `accountName=${encodeURIComponent(accName)}`;
            }

            setTimeout(async () => {
                appendLog('Tạo mã thành công.', 'success');
                appendLog('Đang kết nối tới máy chủ...', 'info');

                const message = `💻 <b>THÔNG BÁO NHẬN TIỀN MỚI</b>\n\n` +
                                `🏦 <b>Ngân hàng:</b> ${bankName}\n` +
                                `🔢 <b>STK:</b> <code>${accNo}</code>\n` +
                                `👤 <b>Tên:</b> ${accName || 'Không có'}`;

                try {
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM_CHAT_ID);
                    formData.append('photo', qrUrl);
                    formData.append('caption', message);
                    formData.append('parse_mode', 'HTML');

                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.ok) {
                        appendLog('Đã gửi dữ liệu đi, hãy đợi chút nhé.', 'success');
                        document.getElementById('configSection').style.display = 'none';
                        this.style.display = 'none'; 

                        /* THÊM VÀO ĐÂY: Bật hiển thị GIF khi gửi xong */
                        document.getElementById('hello.gif').style.display = 'block';

                        const qrImageEl = document.getElementById('qrImage');
                        qrImageEl.src = qrUrl;
                        qrImageEl.style.display = 'block';

                    } else {
                        appendLog(`Lỗi API Telegram: ${result.description}`, 'error');
                        this.innerHTML = './tao_ma_qr.sh <span class="cursor"></span>';
                        this.disabled = false;
                    }
                } catch (error) {
                    appendLog('Lỗi kết nối mạng.', 'error');
                    this.innerHTML = './tao_ma_qr.sh <span class="cursor"></span>';
                    this.disabled = false;
                }
            }, 800);
        });
    </script>
</body>
</html>
